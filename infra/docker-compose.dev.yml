name: daizhang-dev

services:
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile.prod
      args:
        PYTHON_IMAGE: ${API_PYTHON_IMAGE:-swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/library/python:3.11-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple/}
    image: ${API_IMAGE:-daizhang-api:dev-local}
    container_name: daizhang-dev-api
    restart: unless-stopped
    env_file:
      - ./env/api.dev.env
    volumes:
      - ./data/dev/api:/app/data
    ports:
      - "32000:8000"
    networks:
      - daizhang-dev

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile.test
      args:
        NODE_IMAGE: ${WEB_NODE_IMAGE:-swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/library/node:20-alpine}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    image: ${WEB_IMAGE:-daizhang-web:dev-local}
    container_name: daizhang-dev-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "32080:80"
    networks:
      - daizhang-dev

networks:
  daizhang-dev:
    name: daizhang-dev-net
