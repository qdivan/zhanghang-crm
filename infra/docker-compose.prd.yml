name: daizhang-prd

services:
  postgres:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/library/postgres:16-alpine
    container_name: daizhang-prd-postgres
    restart: unless-stopped
    env_file:
      - ./env/postgres.prd.env
    volumes:
      - ./data/prd/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - daizhang-prd

  api:
    image: ${API_IMAGE:-ghcr.io/your-org/daizhang-api:prd-latest}
    container_name: daizhang-prd-api
    restart: unless-stopped
    env_file:
      - ./env/api.prd.env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:31000:8000"
    networks:
      - daizhang-prd

  web:
    image: ${WEB_IMAGE:-ghcr.io/your-org/daizhang-web:prd-latest}
    container_name: daizhang-prd-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "127.0.0.1:31080:80"
    networks:
      - daizhang-prd

networks:
  daizhang-prd:
    name: daizhang-prd-net
