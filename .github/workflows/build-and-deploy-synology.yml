name: Build And Deploy Synology

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY_HOST: ${{ vars.REGISTRY_HOST || 'ghcr.io' }}
  IMAGE_NAMESPACE: ${{ vars.IMAGE_NAMESPACE || github.repository_owner }}
  NAS_GIT_SYNC: ${{ vars.NAS_GIT_SYNC || 'false' }}

concurrency:
  group: synology-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      target_env: ${{ steps.vars.outputs.target_env }}
      channel_tag: ${{ steps.vars.outputs.channel_tag }}
      api_image: ${{ steps.vars.outputs.api_image }}
      web_image: ${{ steps.vars.outputs.web_image }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tags
        id: vars
        run: |
          registry_host="${REGISTRY_HOST}"
          namespace="${IMAGE_NAMESPACE}"
          namespace="$(echo "${namespace}" | tr '[:upper:]' '[:lower:]')"

          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            target_env="prd"
            channel_tag="prd-latest"
          else
            target_env="dev"
            channel_tag="dev-latest"
          fi

          api_image="${registry_host}/${namespace}/daizhang-api"
          web_image="${registry_host}/${namespace}/daizhang-web"

          echo "target_env=${target_env}" >> "$GITHUB_OUTPUT"
          echo "channel_tag=${channel_tag}" >> "$GITHUB_OUTPUT"
          echo "api_image=${api_image}" >> "$GITHUB_OUTPUT"
          echo "web_image=${web_image}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: env.REGISTRY_HOST == 'ghcr.io'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Custom Registry
        if: env.REGISTRY_HOST != 'ghcr.io'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile.prod
          push: true
          tags: |
            ${{ steps.vars.outputs.api_image }}:${{ github.sha }}
            ${{ steps.vars.outputs.api_image }}:${{ steps.vars.outputs.channel_tag }}

      - name: Build and push WEB image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile.prod
          push: true
          tags: |
            ${{ steps.vars.outputs.web_image }}:${{ github.sha }}
            ${{ steps.vars.outputs.web_image }}:${{ steps.vars.outputs.channel_tag }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to NAS via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          TARGET_ENV: ${{ needs.build.outputs.target_env }}
          API_IMAGE: ${{ needs.build.outputs.api_image }}:${{ needs.build.outputs.channel_tag }}
          WEB_IMAGE: ${{ needs.build.outputs.web_image }}:${{ needs.build.outputs.channel_tag }}
          NAS_APP_DIR: ${{ secrets.NAS_APP_DIR }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
          REGISTRY_HOST: ${{ env.REGISTRY_HOST }}
          NAS_GIT_SYNC: ${{ env.NAS_GIT_SYNC }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_PACKAGES_TOKEN }}
        with:
          host: ${{ secrets.NAS_HOST }}
          port: ${{ secrets.NAS_PORT }}
          username: ${{ secrets.NAS_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          envs: TARGET_ENV,API_IMAGE,WEB_IMAGE,NAS_APP_DIR,DEPLOY_BRANCH,REGISTRY_HOST,NAS_GIT_SYNC,REGISTRY_USERNAME,REGISTRY_PASSWORD,GHCR_USER,GHCR_TOKEN
          script: |
            set -euo pipefail

            cd "$NAS_APP_DIR"

            if [[ "${NAS_GIT_SYNC}" == "true" && -d .git ]]; then
              git fetch origin "$DEPLOY_BRANCH"
              git checkout "$DEPLOY_BRANCH"
              git pull --ff-only origin "$DEPLOY_BRANCH"
            fi

            registry_user="${REGISTRY_USERNAME:-}"
            registry_pass="${REGISTRY_PASSWORD:-}"
            if [[ "${REGISTRY_HOST}" == "ghcr.io" ]]; then
              registry_user="${GHCR_USER:-$registry_user}"
              registry_pass="${GHCR_TOKEN:-$registry_pass}"
            fi

            if [[ -n "${registry_user}" && -n "${registry_pass}" ]]; then
              echo "$registry_pass" | docker login "$REGISTRY_HOST" -u "$registry_user" --password-stdin
            fi

            ./infra/scripts/deploy.sh "$TARGET_ENV" "$API_IMAGE" "$WEB_IMAGE"
