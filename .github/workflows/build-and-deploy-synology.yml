name: Build And Deploy Synology

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

concurrency:
  group: synology-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      target_env: ${{ steps.vars.outputs.target_env }}
      channel_tag: ${{ steps.vars.outputs.channel_tag }}
      api_image: ${{ steps.vars.outputs.api_image }}
      web_image: ${{ steps.vars.outputs.web_image }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tags
        id: vars
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"

          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            target_env="prd"
            channel_tag="prd-latest"
          else
            target_env="dev"
            channel_tag="dev-latest"
          fi

          api_image="${REGISTRY}/${owner}/daizhang-api"
          web_image="${REGISTRY}/${owner}/daizhang-web"

          echo "target_env=${target_env}" >> "$GITHUB_OUTPUT"
          echo "channel_tag=${channel_tag}" >> "$GITHUB_OUTPUT"
          echo "api_image=${api_image}" >> "$GITHUB_OUTPUT"
          echo "web_image=${web_image}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile.prod
          push: true
          tags: |
            ${{ steps.vars.outputs.api_image }}:${{ github.sha }}
            ${{ steps.vars.outputs.api_image }}:${{ steps.vars.outputs.channel_tag }}

      - name: Build and push WEB image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile.prod
          push: true
          tags: |
            ${{ steps.vars.outputs.web_image }}:${{ github.sha }}
            ${{ steps.vars.outputs.web_image }}:${{ steps.vars.outputs.channel_tag }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to NAS via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          TARGET_ENV: ${{ needs.build.outputs.target_env }}
          API_IMAGE: ${{ needs.build.outputs.api_image }}:${{ needs.build.outputs.channel_tag }}
          WEB_IMAGE: ${{ needs.build.outputs.web_image }}:${{ needs.build.outputs.channel_tag }}
          NAS_APP_DIR: ${{ secrets.NAS_APP_DIR }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_PACKAGES_TOKEN }}
        with:
          host: ${{ secrets.NAS_HOST }}
          port: ${{ secrets.NAS_PORT }}
          username: ${{ secrets.NAS_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          envs: TARGET_ENV,API_IMAGE,WEB_IMAGE,NAS_APP_DIR,DEPLOY_BRANCH,GHCR_USER,GHCR_TOKEN
          script: |
            set -euo pipefail

            cd "$NAS_APP_DIR"

            if [[ -d .git ]]; then
              git fetch origin "$DEPLOY_BRANCH"
              git checkout "$DEPLOY_BRANCH"
              git pull --ff-only origin "$DEPLOY_BRANCH"
            fi

            if [[ -n "${GHCR_TOKEN:-}" ]]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            fi

            ./infra/scripts/deploy.sh "$TARGET_ENV" "$API_IMAGE" "$WEB_IMAGE"
